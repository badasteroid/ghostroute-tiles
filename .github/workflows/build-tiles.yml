name: Build Valhalla Tile Packs (all US states, skip-if-unchanged)

# What this does:
#   1. Reads states.json from the repo root.
#   2. Runs a matrix job per state. Each job first checks Geofabrik's
#      Last-Modified header against the existing GitHub Release asset's
#      updated_at — if the upstream PBF hasn't changed since we last
#      built that state, the job exits early without rebuilding.
#   3. For states that DO need rebuilding, runs valhalla_build_tiles
#      in Docker and uploads the new .tar to the stable "tiles-latest"
#      release with --clobber so the URL stays the same.
#   4. After all matrix jobs, regenerates catalog.json from the current
#      state of the release. Per-pack `version` is the asset's
#      updated_at timestamp — unchanged packs keep the same version,
#      so the app's per-pack version comparison naturally skips them.
#
# Result: the FIRST run takes 2–3 hours (everything new). Subsequent
# runs where 0–5 states changed take 10–30 minutes — most state jobs
# exit early after a HEAD request, only the changed ones actually
# build. A "nothing changed" run finishes in well under 10 minutes
# (the entire matrix becomes "echo skip" jobs).
#
# The app's `routingTilePackService.ts` does not need any changes —
# it already compares its locally-stored `installedVersion` to the
# catalog's per-pack `version` string. Timestamps work as well as
# tags here.

on:
  workflow_dispatch:
    inputs:
      states:
        description: 'Comma-separated state ids to build (default: all from states.json)'
        required: false
        default: ''
      force_rebuild:
        description: 'Rebuild every state, ignoring the skip-if-unchanged check'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  push:
    branches: [main]
    paths:
      - 'states.json'
      - '.github/workflows/build-tiles.yml'
  schedule:
    # Quarterly rebuild — first of Jan/Apr/Jul/Oct at 06:00 UTC.
    # Monthly was overkill: road networks barely change month-over-
    # month, and the per-state skip check makes manual reruns cheap
    # any time fresh OSM data lands.
    - cron: '0 6 1 1,4,7,10 *'

permissions:
  contents: write

concurrency:
  group: tile-build
  cancel-in-progress: false

env:
  # Stable release tag — every run uploads with --clobber so the URL
  # is permanent. The app fetches catalog.json from
  # https://github.com/<owner>/<repo>/releases/latest/download/catalog.json
  # which resolves to whichever release is most recent; we only have
  # one, so it always resolves to this tag.
  RELEASE_TAG: tiles-latest

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Build matrix from states.json (filtered if caller passed states=)
        id: matrix
        run: |
          FILTER='${{ github.event.inputs.states }}'
          if [ -z "$FILTER" ]; then
            MATRIX=$(jq -c '{include: .regions}' states.json)
          else
            MATRIX=$(jq -c --arg ids "$FILTER" '
              ($ids | split(",") | map(gsub("^\\s+|\\s+$"; ""))) as $wanted
              | {include: [.regions[] | select(.id as $i | $wanted | index($i))]}
            ' states.json)
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  prepare-release:
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or update stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — reusing."
          else
            gh release create "$RELEASE_TAG" \
              --title "Tile packs (continuously updated)" \
              --notes "Continuously updated stable release. Per-pack version = asset updated_at."
          fi

  # ── Fetch ALPR cameras from OSM Overpass — once for the whole US ─────────
  # The per-state matrix jobs all need the same camera snapshot. Pulling it
  # once up front and sharing via artifact is friendlier to Overpass than 51
  # parallel queries (and gives every state a CONSISTENT snapshot — if a
  # contributor adds a camera mid-run, no state job sees an asymmetric view).
  #
  # Output artifact: `cameras-us.json`, a JSON array of
  #   [{id: "overpass-<osm_id>", lat, lon, direction?}, ...]
  # matching the format precompute-camera-edges.py expects.
  fetch-cameras:
    needs: init
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Query Overpass for all US ALPR cameras
        run: |
          # US bbox roughly: 24.396308,-125.0,49.384358,-66.93457
          # (continental US + most of AK/HI captured by a more generous bbox)
          # Per OSM convention, surveillance:type=ALPR identifies the
          # cameras DeFlock contributes. We accept either `direction` or
          # `camera:direction` for the lens bearing — both appear in OSM
          # depending on contributor convention (DeFlock's mobile guide
          # uses `direction`; the Wiki advocates `camera:direction`).
          #
          # `timeout:600` (10 min) lets Overpass do this in one shot without
          # 504'ing. The response is typically 5–10 MB.
          QUERY='[out:json][timeout:600];
          node["man_made"="surveillance"]["surveillance:type"="ALPR"]
            (24.0,-130.0,72.0,-64.0);
          out body;'

          # Header notes (post-mortem 2026-05-27): the first iteration of
          # this step sent curl's defaults — Accept: */* and User-Agent:
          # curl/X.Y.Z — and got HTTP 406 on every attempt from
          # overpass-api.de within ~300 ms. That's a front-door
          # rejection (NGINX/proxy filtering on UA + Accept signatures
          # commonly associated with scrapers), not a query problem.
          # Setting both explicitly fixes it:
          #   - User-Agent: identifies the CI client so the operator can
          #     contact us if our usage causes issues.
          #   - Accept: application/json: matches the query's [out:json]
          #     directive; eliminates content-negotiation ambiguity.
          UA="ghostroute-tiles-ci/1.0 (+https://github.com/badasteroid/ghostroute-tiles)"

          # Endpoint rotation. overpass-api.de is the canonical
          # community instance; kumi.systems is the community mirror
          # we fall back to when the main hits rate limits or has an
          # outage. The retry loop tries main 3 times, then mirror 2
          # times, before failing.
          ENDPOINTS=(
            'https://overpass-api.de/api/interpreter'
            'https://overpass-api.de/api/interpreter'
            'https://overpass-api.de/api/interpreter'
            'https://overpass.kumi.systems/api/interpreter'
            'https://overpass.kumi.systems/api/interpreter'
          )

          attempt=0
          for endpoint in "${ENDPOINTS[@]}"; do
            attempt=$((attempt + 1))
            echo "Overpass attempt ${attempt}/${#ENDPOINTS[@]} against ${endpoint}..."
            HTTP_CODE=$(curl -sS \
              --max-time 700 \
              -A "$UA" \
              -H 'Accept: application/json' \
              -o overpass-raw.json \
              -w '%{http_code}' \
              -X POST \
              "$endpoint" \
              --data-urlencode "data=${QUERY}")
            echo "  HTTP ${HTTP_CODE}"
            if [ "$HTTP_CODE" = "200" ] && [ -s overpass-raw.json ]; then
              echo "  success — ${endpoint}"
              break
            fi
            # Show a head of the response body on non-200 to aid future
            # diagnosis (HTML error pages, JSON error envelopes, etc.).
            if [ -s overpass-raw.json ]; then
              echo "  --- response head (first 500 chars) ---"
              head -c 500 overpass-raw.json || true
              echo
              echo "  --- end response head ---"
            fi
            if [ "$attempt" -eq "${#ENDPOINTS[@]}" ]; then
              echo "::error::Overpass failed across ${#ENDPOINTS[@]} attempts (last HTTP=$HTTP_CODE)"
              exit 1
            fi
            # Exponential-ish backoff: 15s, 30s, 60s, 120s.
            sleep $((15 * attempt))
          done

          RAW_SIZE=$(stat -c%s overpass-raw.json 2>/dev/null || stat -f%z overpass-raw.json)
          echo "Raw Overpass response: ${RAW_SIZE} bytes"

      - name: Transform Overpass payload to script-expected shape
        run: |
          # Overpass gives us a nested {version, generator, elements: [{type, id, lat, lon, tags}, ...]}
          # The script wants a flat [{id, lat, lon, direction?}, ...] array.
          jq '
            [.elements[]
              | select(.type == "node" and .lat != null and .lon != null)
              | {
                  id: ("overpass-" + (.id | tostring)),
                  lat: .lat,
                  lon: .lon,
                  direction: (
                    (.tags.direction // .tags["camera:direction"]) as $d
                    | if $d == null or $d == "" then null
                      else ($d | tonumber? // null)
                      end
                  ),
                }
              | with_entries(select(.value != null))
            ]
          ' overpass-raw.json > cameras-us.json

          COUNT=$(jq 'length' cameras-us.json)
          WITH_DIR=$(jq '[.[] | select(.direction != null)] | length' cameras-us.json)
          echo "Camera count: ${COUNT} (${WITH_DIR} with direction, $((COUNT - WITH_DIR)) without)"
          if [ "$COUNT" -lt 100 ]; then
            echo "::error::Suspiciously few cameras returned (${COUNT}). Overpass query may have failed silently."
            head -c 2000 overpass-raw.json
            exit 1
          fi

      - name: Upload cameras-us.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cameras-us
          path: cameras-us.json
          retention-days: 30

  build:
    needs: [init, prepare-release, fetch-cameras]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      # ── Skip-if-unchanged gate ─────────────────────────────────────
      # Compare Geofabrik's Last-Modified against the existing release
      # asset's updated_at. If the upstream PBF is no newer than what
      # we last built, skip everything below.
      - name: Check if rebuild needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORCE='${{ github.event.inputs.force_rebuild }}'
          PBF_URL="https://download.geofabrik.de/${{ matrix.path }}-latest.osm.pbf"
          ASSET="ghostroute_${{ matrix.id }}_tiles.tar"

          # Geofabrik's HEAD response carries a Last-Modified header
          # in HTTP date format. Convert to epoch for comparison.
          UPSTREAM_HEADER=$(curl -sI --max-time 30 "$PBF_URL" | grep -i '^last-modified:' | sed 's/^[Ll]ast-[Mm]odified:[[:space:]]*//' | tr -d '\r\n')
          if [ -z "$UPSTREAM_HEADER" ]; then
            echo "No Last-Modified header from upstream — assume rebuild needed."
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          UPSTREAM_TS=$(date -u -d "$UPSTREAM_HEADER" +%s 2>/dev/null || echo 0)
          echo "Upstream PBF Last-Modified: $UPSTREAM_HEADER (epoch $UPSTREAM_TS)"

          if [ "$FORCE" = "true" ]; then
            echo "force_rebuild=true was passed — rebuilding regardless of timestamps."
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "upstream_ts=$UPSTREAM_TS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get existing asset's updatedAt from the release.
          EXISTING_UPDATED=$(gh release view "$RELEASE_TAG" --json assets -q \
            ".assets[] | select(.name == \"$ASSET\") | .updatedAt" 2>/dev/null || true)
          if [ -z "$EXISTING_UPDATED" ]; then
            echo "No existing asset for $ASSET — first build."
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "upstream_ts=$UPSTREAM_TS" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EXISTING_TS=$(date -u -d "$EXISTING_UPDATED" +%s 2>/dev/null || echo 0)
          echo "Existing asset $ASSET updated_at: $EXISTING_UPDATED (epoch $EXISTING_TS)"

          # The Last-Modified date on Geofabrik changes whenever a new
          # PBF is published, even if road geometry didn't change. That's
          # fine — it bounds the staleness of our pack to the upstream
          # publishing cadence. False positives (rebuilding when nothing
          # actually changed) cost CPU, not correctness.
          if [ "$UPSTREAM_TS" -gt "$EXISTING_TS" ]; then
            echo "Upstream is newer — rebuild."
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "upstream_ts=$UPSTREAM_TS" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream is no newer than existing asset — SKIP."
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      # All steps below only run when needs_rebuild == 'true'.

      - name: Free disk space
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Download OSM extract
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          URL="https://download.geofabrik.de/${{ matrix.path }}-latest.osm.pbf"
          curl -fL --retry 3 --retry-delay 5 -o region.osm.pbf "$URL"
          ls -lh region.osm.pbf

      - name: Build Valhalla tiles
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          mkdir -p valhalla_tiles
          docker run --rm -v "$PWD:/data" ghcr.io/valhalla/valhalla:3.6.3 \
            valhalla_build_config \
              --mjolnir-tile-dir /data/valhalla_tiles \
            > valhalla.json
          docker run --rm -v "$PWD:/data" ghcr.io/valhalla/valhalla:3.6.3 \
            valhalla_build_tiles -c /data/valhalla.json /data/region.osm.pbf
          COUNT=$(find valhalla_tiles -name '*.gph' -type f | wc -l)
          echo "Produced $COUNT .gph tile files"
          test "$COUNT" -gt 0

      # ── Camera-edge precomputation ─────────────────────────────────
      # For every ALPR camera in this state's bbox, resolve to its set
      # of graph edge centroids using the just-built tiles. Output is
      # cameras-edges.json, packed into the tar alongside the tile
      # level directories. See scripts/.../precompute-camera-edges.py
      # for the per-camera coverage policy.
      #
      # Gated on needs_rebuild — sidecar is only refreshed when tile
      # pack rebuilds. Decoupling sidecar updates from tile rebuilds
      # is a future enhancement (separate asset); for now the staleness
      # ceiling is the quarterly tile-rebuild cron, plus any
      # on-push/manual triggers.
      - name: Download cameras-us snapshot
        if: steps.check.outputs.needs_rebuild == 'true'
        uses: actions/download-artifact@v4
        with:
          name: cameras-us
          path: .

      # ── Run Valhalla service in Docker ──────────────────────────────
      # First iteration tried `pip install valhalla` to invoke locate
      # in-process. The PyPI wheel's __init__.py has a broken absolute
      # import (`from filters import lookup` instead of relative) that
      # ModuleNotFoundError's on Python 3.12 in CI. Rather than depend
      # on a packaging bug we don't control, we run valhalla_service
      # from the SAME Docker image we use to build the tiles (those
      # binaries are known good — they just produced the .gph files
      # we're about to query). The precompute script supports both
      # backends via --valhalla-config (pip wheel) or --service-url
      # (HTTP); we use the latter here.
      #
      # The service binds 0.0.0.0:8002 by default; published as host
      # port 8002 for our Python script to POST against. Started
      # detached, given ~10 s to come up, then killed in the cleanup
      # step regardless of outcome.
      - name: Start valhalla_service in background
        id: svc
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          # Inside-Docker valhalla.json — service runs in container so
          # tile-dir is /data/valhalla_tiles (matches what
          # valhalla_build_tiles wrote above).
          docker run -d --name valhalla-svc \
            -v "$PWD:/data" \
            -p 8002:8002 \
            ghcr.io/valhalla/valhalla:3.6.3 \
            valhalla_service /data/valhalla.json 1
          # Wait for the HTTP endpoint to come up. Poll /status (cheap
          # endpoint that returns 200 immediately once the actor is
          # initialized). 30 s is generous; in practice the service
          # binds in 2-5 s.
          READY=0
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 http://localhost:8002/status > /dev/null 2>&1; then
              READY=1
              echo "valhalla_service ready after ${i}s"
              break
            fi
            sleep 1
          done
          if [ "$READY" -ne 1 ]; then
            echo "::error::valhalla_service did not become ready within 30 s"
            docker logs valhalla-svc | tail -40
            exit 1
          fi

      - name: Precompute camera-to-edge map for this state
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          # Compose the bbox argument from states.json (a JSON object
          # under .regions[].bbox keyed by id).
          BBOX=$(jq -r --arg id "${{ matrix.id }}" '
            .regions[] | select(.id == $id) | .bbox
            | "\(.swLat),\(.swLon),\(.neLat),\(.neLon)"
          ' states.json)
          if [ -z "$BBOX" ] || [ "$BBOX" = "null,null,null,null" ]; then
            echo "::error::No bbox in states.json for state ${{ matrix.id }}"
            exit 1
          fi
          echo "bbox=$BBOX"

          # Name the sidecar PER STATE so multi-state installs don't
          # overwrite each other. Each pack's tar contributes its own
          # cameras-edges-<stateId>.json file; the app's tile-pack
          # extractor preserves them all because the filenames are
          # unique.
          SIDECAR="cameras-edges-${{ matrix.id }}.json"
          python3 scripts/ghostroute-tiles-workflow/precompute-camera-edges.py \
            --service-url http://localhost:8002 \
            --cameras-input cameras-us.json \
            --bbox "$BBOX" \
            --state-id "${{ matrix.id }}" \
            --output "valhalla_tiles/${SIDECAR}"

          # Sanity log so we can see in the workflow run how many cameras
          # got resolved per state.
          CAMS=$(jq '.cameras | length' "valhalla_tiles/${SIDECAR}")
          EDGES=$(jq '[.cameras[].edges | length] | add // 0' "valhalla_tiles/${SIDECAR}")
          BYTES=$(stat -c%s "valhalla_tiles/${SIDECAR}" 2>/dev/null || stat -f%z "valhalla_tiles/${SIDECAR}")
          echo "[${{ matrix.id }}] ${SIDECAR}: ${CAMS} cameras, ${EDGES} edge centroids, ${BYTES} bytes"

      - name: Stop valhalla_service
        # Always — clean up the container even if precompute failed.
        if: always() && steps.check.outputs.needs_rebuild == 'true'
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q '^valhalla-svc$'; then
            docker logs valhalla-svc 2>&1 | tail -20 || true
            docker rm -f valhalla-svc > /dev/null
          fi

      - name: Pack tiles into tar
        id: pack
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          ASSET="ghostroute_${{ matrix.id }}_tiles.tar"
          cd valhalla_tiles
          shopt -s nullglob
          DIRS=([0-9] [0-9][0-9])
          # Include cameras-edges-<stateId>.json at the root of the tar
          # alongside the tile level directories. Per-state filename so
          # multiple installed packs coexist without overwriting.
          SIDECARS=(cameras-edges-*.json)
          shopt -u nullglob
          tar cf "../$ASSET" "${DIRS[@]}" "${SIDECARS[@]}"
          cd ..
          SIZE=$(stat -c%s "$ASSET")
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          if [ "$SIZE" -gt 2147483647 ]; then
            echo "::error::Pack ${{ matrix.id }} is $SIZE bytes > 2 GB GitHub Release limit. Split with Geofabrik subregions or osmium."
            exit 1
          fi
          ls -lh "$ASSET"

      - name: Upload pack to release (clobber existing)
        if: steps.check.outputs.needs_rebuild == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "${{ steps.pack.outputs.asset }}" \
            --clobber

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.needs_rebuild }}" = "true" ]; then
            echo "::notice title=${{ matrix.id }}::Built and uploaded"
          else
            echo "::notice title=${{ matrix.id }}::Skipped — already current"
          fi

  catalog:
    needs: [init, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog.json from current release state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          # Fetch all assets currently in the release with their updated_at.
          gh release view "$RELEASE_TAG" \
            --json assets \
            -q '.assets' \
            > release-assets.json

          # Join states.json (bbox + name) with the live asset list.
          # Per-pack version = asset.updated_at (ISO 8601 string). An
          # unchanged pack keeps its prior updated_at, so the app's
          # version comparison naturally skips re-downloading it.
          jq -n \
            --slurpfile assets release-assets.json \
            --slurpfile states states.json \
            --arg generated "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg repo "$REPO" \
            --arg tag  "$RELEASE_TAG" \
            '
            ($assets[0]) as $rel
            | ($states[0].regions) as $regions
            | {
                version: "release-\($tag)",
                generatedAt: $generated,
                packs: ([
                  $regions[] | . as $r
                  | ($rel[] | select(.name == "ghostroute_\($r.id)_tiles.tar")) as $a
                  | select($a != null)
                  | {
                      id: $r.id,
                      name: $r.name,
                      asset: $a.name,
                      url: "https://github.com/\($repo)/releases/download/\($tag)/\($a.name)",
                      sizeBytes: $a.size,
                      sha256: "",
                      bbox: $r.bbox,
                      version: $a.updatedAt,
                    }
                ])
              }
            ' > catalog.json

          PACK_COUNT=$(jq '.packs | length' catalog.json)
          echo "Generated catalog with $PACK_COUNT packs"
          jq '.packs[] | {id, version, sizeBytes}' catalog.json | head -40

          # Production safety: refuse to publish an empty or near-empty
          # catalog. The previous workflow had `if: always()` on this
          # job, which fired even when every state build failed (e.g.
          # the 2026-05-27 force_rebuild run where pip valhalla wheel
          # broke). That overwrote a working catalog with 0 packs and
          # broke production. Now: if the catalog has fewer than the
          # last-known-good count (kept as a release annotation), we
          # exit without uploading and surface a workflow error.
          #
          # Threshold: at least half of states.json's region count.
          # Below that, something has gone systematically wrong (we
          # already passed init+prepare+fetch-cameras to even reach
          # catalog, so the matrix didn't completely no-op; an empty
          # or near-empty packs[] means many state builds failed).
          STATE_COUNT=$(jq '.regions | length' states.json)
          MIN_REQUIRED=$(( STATE_COUNT / 2 ))
          if [ "$PACK_COUNT" -lt "$MIN_REQUIRED" ]; then
            echo "::error::Catalog has only $PACK_COUNT of $STATE_COUNT possible state packs (threshold: $MIN_REQUIRED). Refusing to upload — would clobber a working catalog with an incomplete one. Check the matrix build logs for state failures."
            exit 1
          fi

      - name: Upload catalog.json (clobber)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" catalog.json --clobber
